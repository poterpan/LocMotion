<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocMotion</title>
  <!-- Leaflet 1.9 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Tailwind CSS 2.2 -->
  <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { width: 100%; height: 100%; }
    .slider-label { min-width: 3rem; text-align: right; }
    /* Custom scrollbar for sidebar */
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: #1f2937; }
    #sidebar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
    /* Range input styling */
    input[type=range] { accent-color: #3b82f6; }
    /* Mode button active state */
    .mode-btn.active { background-color: #2563eb; color: white; }
    /* Disabled button */
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Autocomplete dropdown */
    .autocomplete-list {
      position: absolute; z-index: 9999;
      background: #1f2937; border: 1px solid #374151;
      border-radius: 4px; max-height: 180px; overflow-y: auto;
      width: 100%; box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .autocomplete-list div {
      padding: 6px 8px; font-size: 0.8rem; color: #d1d5db;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .autocomplete-list div:hover { background: #374151; }
    /* Map search control */
    .map-search {
      background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      padding: 6px 10px; display: flex; gap: 6px; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4); position: relative;
    }
    .map-search input {
      background: transparent; border: none; outline: none; color: #e5e7eb;
      font-size: 0.85rem; width: 220px;
    }
    .map-search input::placeholder { color: #6b7280; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col" style="height:100vh;overflow:hidden;">

  <!-- ===== HEADER ===== -->
  <header class="bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 py-2 flex-shrink-0">
    <span class="text-lg font-bold tracking-wide text-blue-400">LocMotion</span>
    <div class="flex items-center gap-2">
      <select id="deviceSelect"
        class="bg-gray-700 border border-gray-600 text-gray-100 text-sm rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500"
        style="max-width:200px;">
        <option value="">-- 未偵測到裝置 --</option>
      </select>
      <button id="connectBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1 rounded transition-colors">
        連線
      </button>
    </div>
  </header>

  <!-- ===== MAIN AREA ===== -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Map -->
    <div class="flex-1 relative">
      <div id="map" class="absolute inset-0"></div>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar"
      class="bg-gray-800 border-l border-gray-700 overflow-y-auto flex-shrink-0 p-3 space-y-4"
      style="width:260px;">

      <!-- Route Section -->
      <section>
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">路線規劃</h2>

        <div class="relative mb-1">
          <input id="fromInput" type="text" placeholder="起點（搜尋地址或地標）"
            class="w-full bg-gray-700 border border-gray-600 text-gray-100 text-sm rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500" autocomplete="off" />
          <div id="fromDropdown" class="autocomplete-list hidden"></div>
        </div>
        <div class="relative mb-2">
          <input id="toInput" type="text" placeholder="終點（搜尋地址或地標）"
            class="w-full bg-gray-700 border border-gray-600 text-gray-100 text-sm rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500" autocomplete="off" />
          <div id="toDropdown" class="autocomplete-list hidden"></div>
        </div>

        <!-- Mode Buttons -->
        <div class="flex gap-1 mb-2">
          <button id="btnCar"  class="mode-btn active flex-1 bg-gray-700 hover:bg-gray-600 text-sm py-1 rounded transition-colors" data-mode="driving">開車</button>
          <button id="btnWalk" class="mode-btn flex-1 bg-gray-700 hover:bg-gray-600 text-sm py-1 rounded transition-colors" data-mode="walking">步行</button>
          <button id="btnBike" class="mode-btn flex-1 bg-gray-700 hover:bg-gray-600 text-sm py-1 rounded transition-colors" data-mode="cycling">騎車</button>
        </div>

        <!-- Waypoint list (populated by JS) -->
        <div id="waypointList" class="space-y-0.5 mb-2 max-h-24 overflow-y-auto"></div>
        <div class="flex gap-1 mb-2">
          <button id="clearPointsBtn"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-xs py-1 rounded border border-gray-600 transition-colors">
            清除路線點
          </button>
        </div>

        <p class="text-xs text-gray-500 mb-2">單擊地圖加入路線點，可拖曳調整。雙擊 = 定位。</p>

        <button id="planRouteBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-1 rounded mb-1 transition-colors">
          規劃路線
        </button>

        <!-- Options -->
        <div class="flex gap-3 mb-2 text-xs text-gray-400">
          <label class="flex items-center gap-1 cursor-pointer">
            <input id="returnToStartChk" type="checkbox" class="accent-blue-500" />
            返回起點
          </label>
          <label class="flex items-center gap-1 cursor-pointer">
            <input id="loopChk" type="checkbox" class="accent-blue-500" />
            循環
          </label>
        </div>

        <!-- GPX / GeoJSON Upload -->
        <label class="w-full flex items-center justify-center gap-1 bg-gray-700 hover:bg-gray-600 text-sm py-1 rounded cursor-pointer transition-colors border border-gray-600">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          <span>上傳 GPX / GeoJSON</span>
          <input id="fileUpload" type="file" accept=".gpx,.geojson,.json" class="hidden" />
        </label>
      </section>

      <hr class="border-gray-700" />

      <!-- Speed & Motion -->
      <section>
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">速度與運動</h2>

        <div class="space-y-2">
          <!-- Speed -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>速度</span>
              <span id="speedVal" class="slider-label text-gray-200">50 km/h</span>
            </div>
            <input id="speedSlider" type="range" min="1" max="130" value="50" step="1"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Acceleration -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>加速度</span>
              <span id="accelVal" class="slider-label text-gray-200">2.5 m/s²</span>
            </div>
            <input id="accelSlider" type="range" min="0.1" max="10" value="2.5" step="0.1"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Deceleration -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>減速度</span>
              <span id="decelVal" class="slider-label text-gray-200">3.0 m/s²</span>
            </div>
            <input id="decelSlider" type="range" min="0.1" max="10" value="3.0" step="0.1"
              class="w-full h-1.5 rounded" />
          </div>
        </div>
      </section>

      <hr class="border-gray-700" />

      <!-- Realism -->
      <section>
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">擬真設定</h2>

        <div class="space-y-2">
          <!-- Jitter -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>GPS 抖動</span>
              <span id="jitterVal" class="slider-label text-gray-200">3 m</span>
            </div>
            <input id="jitterSlider" type="range" min="0" max="20" value="3" step="0.5"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Drift -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>靜止漂移</span>
              <span id="driftVal" class="slider-label text-gray-200">3 m</span>
            </div>
            <input id="driftSlider" type="range" min="0" max="30" value="3" step="0.5"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Speed variation -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>速度變異</span>
              <span id="varVal" class="slider-label text-gray-200">10 %</span>
            </div>
            <input id="varSlider" type="range" min="0" max="50" value="10" step="1"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Stop chance -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-0.5">
              <span>停車機率</span>
              <span id="stopChanceVal" class="slider-label text-gray-200">50 %</span>
            </div>
            <input id="stopChanceSlider" type="range" min="0" max="100" value="50" step="1"
              class="w-full h-1.5 rounded" />
          </div>

          <!-- Stop time min/max -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-400 mb-1">
              <span>停車時間</span>
              <span class="text-gray-200 text-xs">
                <span id="stopMinVal">15</span>–<span id="stopMaxVal">45</span> s
              </span>
            </div>
            <div class="flex gap-1">
              <input id="stopMinSlider" type="range" min="1" max="120" value="15" step="1"
                class="w-full h-1.5 rounded" />
              <input id="stopMaxSlider" type="range" min="1" max="300" value="45" step="1"
                class="w-full h-1.5 rounded" />
            </div>
          </div>
        </div>
      </section>

      <hr class="border-gray-700" />

      <!-- Simulation Controls -->
      <section>
        <div class="flex gap-1">
          <button id="startBtn"
            class="flex-1 bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-1.5 rounded transition-colors">
            開始
          </button>
          <button id="pauseBtn"
            class="flex-1 bg-yellow-600 hover:bg-yellow-700 text-white text-sm font-medium py-1.5 rounded transition-colors">
            暫停
          </button>
          <button id="stopBtn"
            class="flex-1 bg-red-600 hover:bg-red-700 text-white text-sm font-medium py-1.5 rounded transition-colors">
            停止
          </button>
        </div>
        <div class="flex gap-1 mt-1">
          <button id="clearRouteBtn"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs py-1 rounded border border-gray-600 transition-colors">
            清除路線
          </button>
        </div>
      </section>

    </aside>
  </div>

  <!-- ===== STATUS BAR ===== -->
  <footer id="statusBar"
    class="bg-gray-800 border-t border-gray-700 px-4 py-1.5 flex-shrink-0 flex items-center gap-4 text-xs">
    <span class="font-semibold text-gray-400">狀態：</span>
    <span id="statusText" class="font-medium text-gray-300">閒置</span>
    <span id="statusSpeed" class="text-gray-400 hidden"></span>
    <span id="statusDist"  class="text-gray-400 hidden"></span>
    <span id="statusEta"   class="text-gray-400 hidden"></span>
  </footer>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
  (() => {
    'use strict';

    // ------------------------------------------------------------------ //
    //  Map setup                                                           //
    // ------------------------------------------------------------------ //
    const map = L.map('map', { zoomControl: true }).setView([25.033, 121.565], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Geolocate on init — center map on user's real position
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => map.setView([pos.coords.latitude, pos.coords.longitude], 15),
        () => {},  // silently keep default if denied
        { enableHighAccuracy: false, timeout: 5000 }
      );
    }

    // --- Map search control (top-left) ---
    const SearchControl = L.Control.extend({
      onAdd() {
        const container = L.DomUtil.create('div', 'map-search');
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        const input = L.DomUtil.create('input', '', container);
        input.type = 'text';
        input.placeholder = '搜尋地點...';
        input.id = 'mapSearchInput';
        const dropdown = L.DomUtil.create('div', 'autocomplete-list hidden', container);
        dropdown.id = 'mapSearchDropdown';
        dropdown.style.position = 'absolute';
        dropdown.style.top = '100%';
        dropdown.style.left = '0';
        dropdown.style.width = '100%';
        dropdown.style.marginTop = '4px';
        return container;
      },
    });
    map.addControl(new SearchControl({ position: 'topleft' }));

    // Current position marker (blue circle)
    const posIcon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:#3b82f6;border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(59,130,246,.7)"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });
    let posMarker = null;

    // Route polyline
    let routePolyline = null;
    // Traffic signal markers
    let signalMarkers = [];
    // Trail (last 200 positions)
    const trailPositions = [];
    let trailPolyline = null;

    // ------------------------------------------------------------------ //
    //  Map double-click -> set static location (clear trail)               //
    // ------------------------------------------------------------------ //
    map.doubleClickZoom.disable();
    let _clickTimer = null;

    map.on('dblclick', async (e) => {
      if (_clickTimer) { clearTimeout(_clickTimer); _clickTimer = null; }
      if (!connected) return;
      const { lat, lng } = e.latlng;
      trailPositions.length = 0;
      if (trailPolyline) { map.removeLayer(trailPolyline); trailPolyline = null; }
      try {
        await fetch('/api/location/set', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng }),
        });
        updatePosMarker(lat, lng);
      } catch (err) {
        console.error('location/set failed:', err);
      }
    });

    // ------------------------------------------------------------------ //
    //  Map single-click -> add route waypoint                              //
    // ------------------------------------------------------------------ //
    const routePoints = [];      // [{lat, lng}]
    const routePointMarkers = []; // L.Marker[]

    function makePointIcon(index, total) {
      const isStart = index === 0;
      const isEnd = index === total - 1 && total > 1;
      const color = isStart ? '#22c55e' : isEnd ? '#ef4444' : '#f59e0b';
      const label = isStart ? 'S' : isEnd ? 'E' : String(index);
      return L.divIcon({
        className: '',
        html: '<div style="width:24px;height:24px;background:' + color +
              ';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;' +
              'justify-content:center;font-size:11px;font-weight:bold;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">' +
              label + '</div>',
        iconSize: [24, 24],
        iconAnchor: [12, 12],
      });
    }

    function refreshPointMarkers() {
      routePointMarkers.forEach(m => map.removeLayer(m));
      routePointMarkers.length = 0;
      routePoints.forEach((pt, i) => {
        const m = L.marker([pt.lat, pt.lng], {
          icon: makePointIcon(i, routePoints.length),
          draggable: true,
        }).addTo(map);
        m.on('dragend', (e) => {
          const pos = e.target.getLatLng();
          routePoints[i] = { lat: pos.lat, lng: pos.lng };
          refreshPointMarkers();
          updateWaypointList();
        });
        routePointMarkers.push(m);
      });
      updateWaypointList();
    }

    function updateWaypointList() {
      const container = document.getElementById('waypointList');
      while (container.firstChild) container.removeChild(container.firstChild);
      routePoints.forEach((pt, i) => {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-1 text-xs text-gray-300';
        const label = document.createElement('span');
        const isStart = i === 0;
        const isEnd = i === routePoints.length - 1 && routePoints.length > 1;
        label.textContent = (isStart ? 'S' : isEnd ? 'E' : i) + ': ' +
          pt.lat.toFixed(4) + ', ' + pt.lng.toFixed(4);
        label.className = 'flex-1 truncate';
        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'x';
        removeBtn.className = 'text-red-400 hover:text-red-300 px-1';
        removeBtn.addEventListener('click', () => {
          routePoints.splice(i, 1);
          refreshPointMarkers();
        });
        row.appendChild(label);
        row.appendChild(removeBtn);
        container.appendChild(row);
      });
    }

    map.on('click', (e) => {
      // Queue waypoint add; dblclick handler cancels this if it fires
      if (_clickTimer) clearTimeout(_clickTimer);
      _clickTimer = setTimeout(() => {
        _clickTimer = null;
        routePoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
        refreshPointMarkers();
      }, 500);
    });

    // ------------------------------------------------------------------ //
    //  Devices                                                             //
    // ------------------------------------------------------------------ //
    const deviceSelect = document.getElementById('deviceSelect');
    const connectBtn   = document.getElementById('connectBtn');
    let connected = false;

    async function loadDevices() {
      try {
        const res  = await fetch('/api/devices');
        const list = await res.json();
        // Clear existing options (safe DOM)
        while (deviceSelect.firstChild) deviceSelect.removeChild(deviceSelect.firstChild);
        if (!list || list.length === 0) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = '-- 未偵測到裝置 --';
          deviceSelect.appendChild(opt);
        } else {
          list.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.udid;
            opt.dataset.connType = d.conn_type || 'USB';
            opt.textContent = d.name + ' (' + d.ios_version + ' / ' + d.conn_type + ')';
            deviceSelect.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('loadDevices failed:', err);
      }
    }

    connectBtn.addEventListener('click', async () => {
      if (!connected) {
        const selected = deviceSelect.options[deviceSelect.selectedIndex];
        if (!selected || !selected.value) return;
        try {
          const resp = await fetch('/api/devices/connect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ udid: selected.value, conn_type: selected.dataset.connType || 'USB' }),
          });
          if (!resp.ok) {
            const data = await resp.json().catch(() => ({}));
            alert('連線失敗：' + (data.error || resp.statusText));
            return;
          }
          connected = true;
          connectBtn.textContent = '中斷連線';
          connectBtn.classList.replace('bg-blue-600', 'bg-red-600');
          connectBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
        } catch (err) {
          alert('連線失敗：' + err.message);
        }
      } else {
        try {
          await fetch('/api/devices/disconnect', { method: 'POST' });
        } catch (_) {}
        connected = false;
        connectBtn.textContent = '連線';
        connectBtn.classList.replace('bg-red-600', 'bg-blue-600');
        connectBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
      }
    });

    loadDevices();

    // Restore connected state from server on page load
    (async () => {
      try {
        const res = await fetch('/api/devices/status');
        const data = await res.json();
        if (data.connected) {
          connected = true;
          connectBtn.textContent = '中斷連線';
          connectBtn.classList.replace('bg-blue-600', 'bg-red-600');
          connectBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
        }
      } catch (_) {}
    })();

    // ------------------------------------------------------------------ //
    //  Mode presets                                                        //
    // ------------------------------------------------------------------ //
    const PRESETS = {
      driving: { speed: 50, accel: 2.5, decel: 3.0, jitter: 3, drift: 3,  variation: 10, stopChance: 50, stopMin: 15, stopMax: 45 },
      walking: { speed: 5,  accel: 1.0, decel: 1.5, jitter: 3, drift: 5,  variation: 15, stopChance: 30, stopMin: 5,  stopMax: 15 },
      cycling: { speed: 18, accel: 1.5, decel: 2.0, jitter: 3, drift: 4,  variation: 12, stopChance: 40, stopMin: 8,  stopMax: 25 },
    };

    let currentMode = 'driving';

    function applyPreset(mode) {
      const p = PRESETS[mode];
      if (!p) return;
      currentMode = mode;

      setSlider('speedSlider',      p.speed,       'speedVal',       v => v + ' km/h');
      setSlider('accelSlider',      p.accel,       'accelVal',       v => v.toFixed(1) + ' m/s²');
      setSlider('decelSlider',      p.decel,       'decelVal',       v => v.toFixed(1) + ' m/s²');
      setSlider('jitterSlider',     p.jitter,      'jitterVal',      v => v + ' m');
      setSlider('driftSlider',      p.drift,       'driftVal',       v => v + ' m');
      setSlider('varSlider',        p.variation,   'varVal',         v => v + ' %');
      setSlider('stopChanceSlider', p.stopChance,  'stopChanceVal',  v => v + ' %');
      setSlider('stopMinSlider',    p.stopMin,     'stopMinVal',     v => v);
      setSlider('stopMaxSlider',    p.stopMax,     'stopMaxVal',     v => v);

      // Update active button style
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.querySelector('[data-mode="' + mode + '"]');
      if (activeBtn) activeBtn.classList.add('active');
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => applyPreset(btn.dataset.mode));
    });

    // ------------------------------------------------------------------ //
    //  Slider helpers                                                      //
    // ------------------------------------------------------------------ //
    function setSlider(sliderId, value, labelId, fmt) {
      const slider = document.getElementById(sliderId);
      const label  = document.getElementById(labelId);
      if (slider) slider.value = value;
      if (label)  label.textContent = fmt(parseFloat(value));
    }

    function bindSlider(sliderId, labelId, fmt) {
      const slider = document.getElementById(sliderId);
      const label  = document.getElementById(labelId);
      if (!slider) return;
      slider.addEventListener('input', () => {
        if (label) label.textContent = fmt(parseFloat(slider.value));
        // Live speed update during simulation
        if (sliderId === 'speedSlider') {
          fetch('/api/simulation/speed', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ speed_kmh: parseFloat(slider.value) }),
          }).catch(() => {});
        }
      });
    }

    bindSlider('speedSlider',      'speedVal',      v => v + ' km/h');
    bindSlider('accelSlider',      'accelVal',      v => v.toFixed(1) + ' m/s²');
    bindSlider('decelSlider',      'decelVal',      v => v.toFixed(1) + ' m/s²');
    bindSlider('jitterSlider',     'jitterVal',     v => v + ' m');
    bindSlider('driftSlider',      'driftVal',      v => v + ' m');
    bindSlider('varSlider',        'varVal',        v => v + ' %');
    bindSlider('stopChanceSlider', 'stopChanceVal', v => v + ' %');
    bindSlider('stopMinSlider',    'stopMinVal',    v => Math.round(v));
    bindSlider('stopMaxSlider',    'stopMaxVal',    v => Math.round(v));

    // ------------------------------------------------------------------ //
    //  Geocode helper + autocomplete                                       //
    // ------------------------------------------------------------------ //
    let _acTimers = {};
    // Stored selected coords: { fromInput: {lat,lng}, toInput: {lat,lng} }
    const selectedCoords = {};

    async function geocodeAll(query) {
      const res  = await fetch('/api/geocode?q=' + encodeURIComponent(query));
      return await res.json();  // [{lat, lng}, ...]
    }

    // Nominatim returns lat/lng; we also need display names, so we call Nominatim
    // directly for autocomplete (with display_name). Backend /api/geocode only returns coords.
    // Let's extend backend or just use the backend. For simplicity, we fetch full results:
    async function geocodeWithNames(query) {
      const res = await fetch('/api/geocode/search?q=' + encodeURIComponent(query));
      return await res.json();  // [{lat, lng, display_name}, ...]
    }

    function setupAutocomplete(inputId, dropdownId) {
      const input = document.getElementById(inputId);
      const dropdown = document.getElementById(dropdownId);
      if (!input || !dropdown) return;

      input.addEventListener('input', () => {
        clearTimeout(_acTimers[inputId]);
        const q = input.value.trim();
        if (q.length < 2) { dropdown.classList.add('hidden'); return; }
        _acTimers[inputId] = setTimeout(async () => {
          try {
            const results = await geocodeWithNames(q);
            while (dropdown.firstChild) dropdown.removeChild(dropdown.firstChild);
            if (!results || results.length === 0) { dropdown.classList.add('hidden'); return; }
            results.forEach(r => {
              const item = document.createElement('div');
              item.textContent = r.display_name || (r.lat.toFixed(4) + ', ' + r.lng.toFixed(4));
              item.addEventListener('mousedown', (e) => {
                e.preventDefault();
                input.value = r.display_name || (r.lat.toFixed(4) + ', ' + r.lng.toFixed(4));
                selectedCoords[inputId] = { lat: r.lat, lng: r.lng };
                dropdown.classList.add('hidden');
              });
              dropdown.appendChild(item);
            });
            dropdown.classList.remove('hidden');
          } catch (_) { dropdown.classList.add('hidden'); }
        }, 350);  // debounce 350ms
      });

      input.addEventListener('blur', () => {
        setTimeout(() => dropdown.classList.add('hidden'), 200);
      });

      input.addEventListener('focus', () => {
        if (dropdown.childElementCount > 0) dropdown.classList.remove('hidden');
      });
    }

    setupAutocomplete('fromInput', 'fromDropdown');
    setupAutocomplete('toInput', 'toDropdown');
    setupAutocomplete('mapSearchInput', 'mapSearchDropdown');

    // Map search: on select, fly to location and place marker
    const mapSearchInput = document.getElementById('mapSearchInput');
    const mapSearchDropdown = document.getElementById('mapSearchDropdown');
    if (mapSearchInput) {
      const origSetup = mapSearchInput;
      // Override the mousedown in map search to fly to location
      const observer = new MutationObserver(() => {
        // Items are added dynamically; we handle selection via setupAutocomplete
      });
      // Override: when a coord is selected for mapSearchInput, fly there
      mapSearchInput.addEventListener('input', () => {
        // Clear selected coord when typing new text
        delete selectedCoords['mapSearchInput'];
      });
      // Poll for selection (set by setupAutocomplete mousedown handler)
      mapSearchInput.addEventListener('blur', () => {
        setTimeout(() => {
          const coord = selectedCoords['mapSearchInput'];
          if (coord) {
            map.flyTo([coord.lat, coord.lng], 16);
            updatePosMarker(coord.lat, coord.lng);
            delete selectedCoords['mapSearchInput'];
          }
        }, 250);
      });
      // Also handle Enter key
      mapSearchInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          mapSearchDropdown.classList.add('hidden');
          const q = mapSearchInput.value.trim();
          if (!q) return;
          const coord = selectedCoords['mapSearchInput'];
          if (coord) {
            map.flyTo([coord.lat, coord.lng], 16);
            updatePosMarker(coord.lat, coord.lng);
          } else {
            // No selection from dropdown, geocode directly
            const results = await geocodeWithNames(q);
            if (results && results.length > 0) {
              map.flyTo([results[0].lat, results[0].lng], 16);
              updatePosMarker(results[0].lat, results[0].lng);
              mapSearchInput.value = results[0].display_name || q;
            }
          }
        }
      });
    }

    // ------------------------------------------------------------------ //
    //  Route planning                                                      //
    // ------------------------------------------------------------------ //

    document.getElementById('clearPointsBtn').addEventListener('click', () => {
      routePoints.length = 0;
      refreshPointMarkers();
    });

    document.getElementById('planRouteBtn').addEventListener('click', async () => {
      const fromQ = document.getElementById('fromInput').value.trim();
      const toQ   = document.getElementById('toInput').value.trim();
      const returnToStart = document.getElementById('returnToStartChk').checked;

      // Build points list: prefer map points, fall back to text inputs
      let points = [];
      if (routePoints.length >= 2) {
        points = routePoints.slice();
      } else if (fromQ || toQ) {
        // Geocode text inputs
        setStatus('搜尋地址中...', 'text-gray-300');
        let startPt = selectedCoords['fromInput'];
        let endPt   = selectedCoords['toInput'];
        if (!startPt && fromQ) {
          const r = await geocodeAll(fromQ);
          startPt = r && r.length > 0 ? r[0] : null;
        }
        if (!endPt && toQ) {
          const r = await geocodeAll(toQ);
          endPt = r && r.length > 0 ? r[0] : null;
        }
        if (startPt) points.push(startPt);
        // Add any map waypoints in between
        routePoints.forEach(p => points.push(p));
        if (endPt) points.push(endPt);
      }

      if (points.length < 2) {
        setStatus('至少需要 2 個點。請在地圖上點擊或輸入地址。', 'text-yellow-400');
        return;
      }

      try {
        setStatus('規劃路線中...', 'text-gray-300');
        const res = await fetch('/api/route/plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            points: points,
            mode: currentMode,
            return_to_start: returnToStart,
          }),
        });
        const data = await res.json();
        if (data.error) { setStatus(data.error, 'text-red-400'); return; }
        drawRoute(data);
        setStatus('路線已規劃（' + (data.distance / 1000).toFixed(1) + ' km）', 'text-green-400');
      } catch (err) {
        console.error('planRoute failed:', err);
        setStatus('路線規劃失敗', 'text-red-400');
      }
    });

    // ------------------------------------------------------------------ //
    //  GPX / GeoJSON upload                                               //
    // ------------------------------------------------------------------ //
    document.getElementById('fileUpload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      try {
        setStatus('上傳路線中...', 'text-gray-300');
        const res  = await fetch('/api/route/upload', { method: 'POST', body: formData });
        const data = await res.json();
        drawRoute(data);
        setStatus('已載入路線檔案', 'text-green-400');
      } catch (err) {
        console.error('upload failed:', err);
        setStatus('檔案上傳失敗', 'text-red-400');
      }
      e.target.value = '';
    });

    // ------------------------------------------------------------------ //
    //  Draw route on map                                                   //
    // ------------------------------------------------------------------ //
    function drawRoute(data) {
      // Clear existing route layers
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      signalMarkers.forEach(m => map.removeLayer(m));
      signalMarkers = [];
      trailPositions.length = 0;
      if (trailPolyline) { map.removeLayer(trailPolyline); trailPolyline = null; }

      if (!data) return;

      // API returns { polyline: [{lat,lng}], stop_points: [{position:{lat,lng}}], ... }
      const poly = data.polyline || [];
      if (poly.length > 0) {
        const latLngs = poly.map(p => [p.lat, p.lng]);
        routePolyline = L.polyline(latLngs, { color: '#3b82f6', weight: 4, opacity: 0.85 }).addTo(map);
        map.fitBounds(routePolyline.getBounds(), { padding: [30, 30] });
      }

      const stops = data.stop_points || [];
      stops.forEach(sp => {
        const pos = sp.position || sp;
        const m = L.circleMarker([pos.lat, pos.lng], {
          radius: 5, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.9, weight: 1,
        }).addTo(map);
        signalMarkers.push(m);
      });
    }

    // ------------------------------------------------------------------ //
    //  Position marker & trail                                             //
    // ------------------------------------------------------------------ //
    function updatePosMarker(lat, lng) {
      if (!posMarker) {
        posMarker = L.marker([lat, lng], { icon: posIcon, zIndexOffset: 1000 }).addTo(map);
      } else {
        posMarker.setLatLng([lat, lng]);
      }

      trailPositions.push([lat, lng]);
      if (trailPositions.length > 200) trailPositions.shift();

      if (!trailPolyline) {
        trailPolyline = L.polyline(trailPositions, { color: '#3b82f6', weight: 2, opacity: 0.4 }).addTo(map);
      } else {
        trailPolyline.setLatLngs(trailPositions);
      }
    }

    // ------------------------------------------------------------------ //
    //  Status bar                                                          //
    // ------------------------------------------------------------------ //
    const STATUS_COLORS = {
      moving:            'text-green-400',
      accelerating:      'text-blue-400',
      decelerating:      'text-yellow-400',
      stopped_at_signal: 'text-red-400',
      idle:              'text-gray-400',
      paused:            'text-gray-400',
      completed:         'text-purple-400',
    };

    const STATUS_TEXT = {
      moving:            '移動中',
      accelerating:      '加速中',
      decelerating:      '減速中',
      stopped_at_signal: '等紅燈',
      idle:              '閒置',
      paused:            '已暫停',
      completed:         '已完成',
    };

    function setStatus(msg, colorClass) {
      const el = document.getElementById('statusText');
      el.textContent = msg;
      el.className = 'font-medium ' + (colorClass || 'text-gray-300');
    }

    let currentSimStatus = 'idle';

    function updateStatusBar(data) {
      const statusEl = document.getElementById('statusText');
      const speedEl  = document.getElementById('statusSpeed');
      const distEl   = document.getElementById('statusDist');
      const etaEl    = document.getElementById('statusEta');

      const st = (data.status || 'idle').toLowerCase();
      currentSimStatus = st;
      statusEl.textContent = STATUS_TEXT[st] || st.replace(/_/g, ' ');
      statusEl.className   = 'font-medium ' + (STATUS_COLORS[st] || 'text-gray-300');

      if (data.speed_kmh !== undefined) {
        speedEl.textContent = parseFloat(data.speed_kmh).toFixed(1) + ' km/h';
        speedEl.classList.remove('hidden');
      }

      const traveled   = data.distance_traveled_m;
      const remaining  = data.distance_remaining_m;
      if (traveled !== undefined && remaining !== undefined) {
        const totalKm    = ((traveled + remaining) / 1000).toFixed(1);
        const travKm     = (traveled / 1000).toFixed(1);
        distEl.textContent = travKm + '/' + totalKm + ' km';
        distEl.classList.remove('hidden');
      }

      if (data.eta_seconds !== undefined) {
        const mins = Math.floor(data.eta_seconds / 60);
        const secs = String(Math.floor(data.eta_seconds % 60)).padStart(2, '0');
        etaEl.textContent = 'ETA ' + mins + ':' + secs;
        etaEl.classList.remove('hidden');
      }
    }

    // ------------------------------------------------------------------ //
    //  WebSocket                                                           //
    // ------------------------------------------------------------------ //
    let ws = null;

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws');

      ws.addEventListener('message', (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch (_) { return; }
        if (msg.type === 'simulation_state' && msg.data) {
          const d = msg.data;
          if (d.lat !== undefined && d.lng !== undefined) {
            updatePosMarker(d.lat, d.lng);
          }
          updateStatusBar(d);
        }
      });

      ws.addEventListener('close', () => {
        setTimeout(connectWS, 2000);
      });

      ws.addEventListener('error', () => {
        ws.close();
      });
    }

    connectWS();

    // ------------------------------------------------------------------ //
    //  Simulation controls                                                 //
    // ------------------------------------------------------------------ //
    function getSimParams() {
      return {
        mode:                   currentMode,
        base_speed_kmh:         parseFloat(document.getElementById('speedSlider').value),
        acceleration:           parseFloat(document.getElementById('accelSlider').value),
        deceleration:           parseFloat(document.getElementById('decelSlider').value),
        jitter_meters:          parseFloat(document.getElementById('jitterSlider').value),
        stationary_drift_meters:parseFloat(document.getElementById('driftSlider').value),
        speed_variation_pct:    parseFloat(document.getElementById('varSlider').value) / 100,
        stop_probability:       parseFloat(document.getElementById('stopChanceSlider').value) / 100,
        stop_duration_range: [
          parseInt(document.getElementById('stopMinSlider').value, 10),
          parseInt(document.getElementById('stopMaxSlider').value, 10),
        ],
        loop:                   document.getElementById('loopChk').checked,
      };
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      try {
        if (currentSimStatus === 'paused') {
          await fetch('/api/simulation/resume', { method: 'POST' });
          setStatus('繼續中...', 'text-green-400');
        } else {
          await fetch('/api/simulation/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(getSimParams()),
          });
          setStatus('啟動中...', 'text-green-400');
        }
      } catch (err) {
        console.error('sim start failed:', err);
      }
    });

    document.getElementById('pauseBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/simulation/pause', { method: 'POST' });
        setStatus('已暫停', 'text-gray-400');
      } catch (err) {
        console.error('sim pause failed:', err);
      }
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/simulation/stop', { method: 'POST' });
        currentSimStatus = 'idle';
        setStatus('已停止', 'text-red-400');
        document.getElementById('statusSpeed').classList.add('hidden');
        document.getElementById('statusDist').classList.add('hidden');
        document.getElementById('statusEta').classList.add('hidden');
        // Clear trail
        trailPositions.length = 0;
        if (trailPolyline) { map.removeLayer(trailPolyline); trailPolyline = null; }
      } catch (err) {
        console.error('sim stop failed:', err);
      }
    });

    document.getElementById('clearRouteBtn').addEventListener('click', () => {
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      signalMarkers.forEach(m => map.removeLayer(m));
      signalMarkers = [];
      routePoints.length = 0;
      refreshPointMarkers();
    });

    // Apply initial preset
    applyPreset('driving');

  })();
  </script>
</body>
